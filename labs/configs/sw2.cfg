! # LAB ONLY — NOT FOR PRODUCTION
! sw2 represents Site B (confederation sub-AS 64502).
! All addresses use RFC5737 documentation ranges (198.51.100.0/24).
!
hostname PacIXP-SW2
!
service routing protocols model multi-agent
!
vlan 10
   name PEERING-LAN
!
! Infrastructure interfaces — MTU 9214 required for VXLAN overhead
interface Ethernet1
   description INFRA: LINK-TO-SW1 (path 1)
   no switchport
   mtu 9214
   ip address 198.51.100.5/31
!
interface Ethernet2
   description INFRA: LINK-TO-SW1 (path 2)
   no switchport
   mtu 9214
   ip address 198.51.100.7/31
!
interface Ethernet3
   description MEMBER: member4 (AS65004)
   switchport access vlan 10
!
interface Ethernet4
   description MEMBER: member5 (AS65005)
   switchport access vlan 10
!
interface Loopback0
   description EVPN-VTEP-SOURCE
   ip address 198.51.100.2/32
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
!
ip routing
!
router ospf 1
   router-id 198.51.100.2
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
   network 198.51.100.0/24 area 0.0.0.0
!
! sw2 = Site B (sub-AS 64502), sw1 = Site A (sub-AS 64501).
! Sessions to sw1 are confederation eBGP (different sub-AS).
router bgp 64502
   bgp confederation identifier 64500
   bgp confederation peers 64501
   router-id 198.51.100.2
   neighbor 198.51.100.4 remote-as 64501
   neighbor 198.51.100.6 remote-as 64501
   !
   address-family evpn
      neighbor 198.51.100.4 activate
      neighbor 198.51.100.4 next-hop-unchanged
      neighbor 198.51.100.6 activate
      neighbor 198.51.100.6 next-hop-unchanged
   !
   vlan 10
      rd 198.51.100.2:10010
      route-target import 64500:10010
      route-target export 64500:10010
      redistribute learned
