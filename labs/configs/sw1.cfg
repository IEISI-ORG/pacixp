! # LAB ONLY — NOT FOR PRODUCTION
! sw1 represents Site A (confederation sub-AS 64501).
! All addresses use RFC5737 documentation ranges (198.51.100.0/24).
!
hostname PACIXP-SW1
!
service routing protocols model multi-agent
!
vlan 10
   name PEERING-LAN
!
! Infrastructure interfaces — MTU 9214 required for VXLAN overhead
interface Ethernet1
   description INFRA: LINK-TO-SW2 (path 1)
   no switchport
   mtu 9214
   ip address 198.51.100.4/31
!
interface Ethernet2
   description INFRA: LINK-TO-SW2 (path 2)
   no switchport
   mtu 9214
   ip address 198.51.100.6/31
!
interface Ethernet3
   description MEMBER: member1 (AS65001)
   switchport access vlan 10
!
interface Ethernet4
   description MEMBER: member2 (AS65002)
   switchport access vlan 10
!
interface Ethernet5
   description MEMBER: member3 (AS65003)
   switchport access vlan 10
!
interface Ethernet10
   description ROUTE-SERVER: RS1
   switchport access vlan 10
!
interface Loopback0
   description EVPN-VTEP-SOURCE
   ip address 198.51.100.1/32
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
!
ip routing
!
router ospf 1
   router-id 198.51.100.1
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
   network 198.51.100.0/24 area 0.0.0.0
!
! sw1 = Site A (sub-AS 64501), sw2 = Site B (sub-AS 64502).
! Sessions to sw2 are confederation eBGP (different sub-AS).
router bgp 64501
   bgp confederation identifier 64500
   bgp confederation peers 64502
   router-id 198.51.100.1
   neighbor 198.51.100.5 remote-as 64502
   neighbor 198.51.100.7 remote-as 64502
   !
   address-family evpn
      neighbor 198.51.100.5 activate
      neighbor 198.51.100.5 next-hop-unchanged
      neighbor 198.51.100.7 activate
      neighbor 198.51.100.7 next-hop-unchanged
   !
   vlan 10
      rd 198.51.100.1:10010
      route-target import 64500:10010
      route-target export 64500:10010
      redistribute learned
