log stderr all;
router id 192.0.2.254;
protocol device { scan time 10; }
protocol kernel {
    ipv4 { import none; export none; };
    ipv6 { import none; export none; };
}

# RPKI validation — connect to Routinator running in Docker on the lab host.
# Routinator exposes RTR on port 3323 (mapped to the host via compose).
# 172.17.0.1 is the Docker bridge gateway, reachable from containerlab nodes.
# Replace with your host's actual IP if the bridge address differs.
protocol rpki routinator {
    remote 172.17.0.1 port 3323;
    retry keep 90;
    refresh keep 900;
    expire keep 172800;
}

# RFC 7999 RTBH discard addresses.
# Every member router must have a static null route to these addresses.
# When the RS distributes a blackhole route with this next-hop, members
# drop matching traffic at their own edge before it hits their uplink.
define BH_V4 = 192.0.2.0;
define BH_V6 = 3fff:0:1::;

# RTBH import check — IPv4.
# Accepts only /32 host routes tagged (65535, 666); broader prefixes are
# rejected to prevent a member from accidentally blackholing a whole block.
# RTBH routes bypass RPKI/IRR: blocking a blackhole request during an attack
# defeats the purpose. NO_EXPORT (65535:65281) is added so peers do not
# inadvertently leak the blackhole into their upstream transit.
function rtbh_import_v4() {
    if (65535, 666) ~ bgp_community then {
        if net.len != 32 then
            reject "RTBH: IPv4 request must be /32";
        bgp_community.add((65535, 65281));  # NO_EXPORT
        bgp_next_hop = BH_V4;
        accept;
    }
}

# RTBH import check — IPv6.
function rtbh_import_v6() {
    if (65535, 666) ~ bgp_community then {
        if net.len != 128 then
            reject "RTBH: IPv6 request must be /128";
        bgp_community.add((65535, 65281));  # NO_EXPORT
        bgp_next_hop = BH_V6;
        accept;
    }
}

# IPv4 bogon ranges.
# RFC5737 documentation prefixes (192.0.2.0/24, 198.51.100.0/24, 203.0.113.0/24)
# are intentionally omitted — this lab uses them for the peering LAN and member
# test prefixes.  Add all three to BOGONS_V4 in any production deployment.
define BOGONS_V4 = [
    0.0.0.0/8+,           # RFC1122 "this network"
    10.0.0.0/8+,          # RFC1918 private
    100.64.0.0/10+,       # RFC6598 CGNAT shared address space
    127.0.0.0/8+,         # RFC1122 loopback
    169.254.0.0/16+,      # RFC3927 link-local
    172.16.0.0/12+,       # RFC1918 private
    192.0.0.0/24+,        # RFC6890 IANA special purpose
    192.168.0.0/16+,      # RFC1918 private
    198.18.0.0/15+,       # RFC2544 benchmarking
    224.0.0.0/4+,         # RFC5771 multicast
    240.0.0.0/4+          # RFC1112 reserved (Class E)
];

# IPv6 bogon ranges.
# RFC9637 documentation space (3fff::/20) is omitted — the lab uses 3fff:0:1::/64
# for IPv6 peering addresses.  Add it in production.
define BOGONS_V6 = [
    ::/128,               # RFC4291 unspecified
    ::1/128,              # RFC4291 loopback
    ::ffff:0:0/96+,       # RFC4291 IPv4-mapped
    100::/64+,            # RFC6666 discard-only
    2001:db8::/32+,       # RFC3849 documentation
    2002::/16+,           # RFC3056 6to4 (deprecated)
    fc00::/7+,            # RFC4193 unique local
    fe80::/10+,           # RFC4291 link-local
    ff00::/8+             # RFC4291 multicast
];

# Reject bogon ranges, overly specific prefixes (> /24), and excessively broad
# announcements (< /8).  Anything outside /8–/24 is either a host route leaking
# into BGP or a supernet that no member should be originating.
function bogon_filter_v4() {
    if net ~ BOGONS_V4 then reject "bogon prefix";
    if net.len > 24 then reject "prefix too specific";
    if net.len < 8 then reject "prefix too broad";
}

# IPv6 equivalent: accept /16–/48 only.
function bogon_filter_v6() {
    if net ~ BOGONS_V6 then reject "bogon prefix";
    if net.len > 48 then reject "prefix too specific";
    if net.len < 16 then reject "prefix too broad";
}

# The IXP Peering Logic — applies to all member sessions
template bgp member {
    local 192.0.2.254 as 64500;
    rs client;
    # Explicit timers — BIRD defaults (keepalive 60s, hold 240s) are too slow.
    # If a member drops off the peering LAN it should be detected within 30s.
    hold time 30;
    keepalive time 10;
    ipv4 {
        import limit 200 action block;    # Max-prefix guard — silently block new imports when exceeded
        import filter {
            rtbh_import_v4();             # RFC 7999 RTBH — short-circuits before all other checks
            bogon_filter_v4();            # Bogon ranges + prefix-length bounds (/8–/24)
            # IRR gate (production): if net !~ MEMBER_V4_PREFIXES then reject "not in IRR";
            # RPKI gate (production): if roa_check(rpki_table, net, bgp_path.last) = ROA_INVALID then reject "RPKI invalid";
            accept;
        };
        export all;  # In production: export only validated routes
    };
    ipv6 {
        import limit 100 action block;
        import filter {
            rtbh_import_v6();             # RFC 7999 RTBH — short-circuits before all other checks
            bogon_filter_v6();            # Bogon ranges + prefix-length bounds (/16–/48)
            # IRR gate (production): if net !~ MEMBER_V6_PREFIXES then reject "not in IRR";
            # RPKI gate (production): if roa_check(rpki_table, net, bgp_path.last) = ROA_INVALID then reject "RPKI invalid";
            accept;
        };
        export all;  # In production: export only validated routes
    };
}

# Member Sessions
# IPv4 peering IPs from 192.0.2.0/24 (RFC5737 TEST-NET-1)
# IPv6 peering IPs from 3fff:0:1::/64 (RFC9637)
# Member test prefixes from 198.51.100.0/24 (RFC5737 TEST-NET-2)
protocol bgp m1 from member { neighbor 192.0.2.1 as 65001; }
protocol bgp m2 from member { neighbor 192.0.2.2 as 65002; }
protocol bgp m3 from member { neighbor 192.0.2.3 as 65003; }
protocol bgp m4 from member { neighbor 192.0.2.4 as 65004; }
protocol bgp m5 from member { neighbor 192.0.2.5 as 65005; }
